project_name: "physics-chatbot"
seed: 42

# Default base model. Qwen3-4B is the default because it is a strong text-only chat model,
# making it simpler to fine-tune for conversational physics than multimodal alternatives.
base_model: "Qwen/Qwen3-4B"
available_base_models:
  - "Qwen/Qwen3-4B"
  - "Qwen/Qwen3.5-4B"
  - "google/gemma-3-4b-it"
  - "meta-llama/Llama-3.2-3B-Instruct"

# Training strategy.
training_mode: "lora"          # valid: lora, qlora, full
enable_full_finetune: false
load_in_4bit: false            # GPU-only. Kept false for TPU runs.
trust_remote_code: true

# Sequence/training defaults tuned for Colab TPU v5e-1 LoRA runs.
max_seq_length: 1024
train_batch_size: 1
eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0001
num_train_epochs: 30
warmup_ratio: 0.06
weight_decay: 0.01
save_steps: 50
eval_steps: 50
logging_steps: 5
max_grad_norm: 1.0
bf16: true
packing: true
gradient_checkpointing: true
lr_scheduler_type: "cosine"
early_stopping_patience: 5

# LoRA defaults.
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# Data locations.
raw_data_dir: "data/raw"
processed_data_dir: "data/processed"
final_data_dir: "data/final"
custom_data_glob: "data/custom/*.jsonl"
dataset_manifest_path: "data/raw/dataset_manifest.json"
final_dataset_path: "data/final/physics_sft.jsonl"
train_split_path: "data/final/train.jsonl"
validation_split_path: "data/final/validation.jsonl"
test_split_path: "data/final/test.jsonl"

# Dataset processing limits and filters.
max_samples_per_dataset: 50000
min_answer_chars: 40
min_question_chars: 10
min_text_chunk_chars: 300
max_text_chunk_chars: 1800
near_duplicate_hamming_threshold: 3
train_ratio: 0.94
validation_ratio: 0.03
test_ratio: 0.03

# Output locations.
output_dir: "outputs"
adapter_output_dir: "outputs/adapters"
merged_model_dir: "outputs/merged_model"
log_dir: "outputs/logs"

# Inference defaults.
inference:
  system_prompt: "You are PhysicsGPT, a precise physics tutor. Explain concepts step by step, show formulas, define variables, use SI units, and warn when information is uncertain."
  temperature: 0.7
  top_p: 0.9
  max_new_tokens: 512
  enable_thinking: false

# Local OpenAI-compatible API defaults.
api:
  host: "127.0.0.1"
  port: 8000
  model_name: "physics-chatbot"

# Dataset sources. These are downloaded on demand into data/raw rather than committed to the repo.
datasets:
  - name: "physics_reasoning_hf"
    type: "hf"
    enabled: true
    dataset_id: "convaiinnovations/physics-reasoning-dataset"
    config_name: null
    split: "train"
    streaming: true
    max_samples: 40000
    url: "https://huggingface.co/datasets/convaiinnovations/physics-reasoning-dataset"
    license: "apache-2.0"
    citation: "convaiinnovations/physics-reasoning-dataset on Hugging Face"
    question_fields: ["question", "prompt", "input", "instruction"]
    answer_fields: ["response", "answer", "output", "assistant"]
    title_fields: ["title", "topic"]
    topic_hint: "general physics"

  - name: "sciq_physics_hf"
    type: "hf"
    enabled: true
    dataset_id: "allenai/sciq"
    config_name: null
    split: "train"
    streaming: true
    max_samples: 25000
    url: "https://huggingface.co/datasets/allenai/sciq"
    license: "cc-by-nc-3.0"
    citation: "SciQ: Crowdsourced Multiple Choice Science Questions"
    question_fields: ["question"]
    answer_fields: ["correct_answer"]
    support_fields: ["support"]
    topic_hint: "general physics"
    filter_keywords:
      - "force"
      - "energy"
      - "mass"
      - "velocity"
      - "acceleration"
      - "electric"
      - "magnetic"
      - "wave"
      - "optics"
      - "thermo"
      - "quantum"
      - "gravity"

